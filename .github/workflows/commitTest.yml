name: Build Mod

on: [push, pull_request]

jobs:
  buildJar:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'
    - name: Build mod jar
      run: |
        chmod +x ./gradlew
        ./gradlew jar
    - name: Upload built jar file
      uses: actions/upload-artifact@v4
      with:
        name: AutoDrill-Reforged
        path: build/libs/*.jar
